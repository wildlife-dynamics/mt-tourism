[project]
name = "mt-tourism"
channels = [
    'file:///tmp/ecoscope-workflows-custom/release/artifacts/',
    'https://repo.prefix.dev/ecoscope-workflows/',
    'https://repo.prefix.dev/ecoscope-workflows-custom/',
    'conda-forge',
]
platforms = ['linux-64', 'osx-arm64', 'win-64']

[dependencies]
curl = "*"
rattler-build = "*"
yq = "*"
hatch = "*"

[feature.compile.dependencies]
ecoscope-workflows-core = ">=0.22.18, <0.23.0"
ecoscope-workflows-ext-ecoscope = ">=0.22.18, <0.23.0"
ecoscope-workflows-ext-custom = { version = "*", channel = "file:///tmp/ecoscope-workflows-custom/release/artifacts/" }
ecoscope-workflows-ext-mt = { version = "*", channel = "file:///tmp/ecoscope-workflows-custom/release/artifacts/" }

[environments]
compile = { features = [
    "compile",
], solve-group = "compile", no-default-feature = true }
